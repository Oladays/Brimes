<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIMES Live Webinar</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: #010813; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .navbar { width: 100%; background: rgba(10, 25, 47, 0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #233554; position: sticky; top: 0; z-index: 1000; }
        .logo { color: #22c55e; font-weight: 900; font-size: 13px; text-transform: uppercase; }
        
        #audio-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #010813; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .play-btn { background: #22c55e; color: #010813; border: none; padding: 20px 50px; border-radius: 50px; font-size: 18px; font-weight: 900; cursor: pointer; }

        .container { width: 95%; max-width: 450px; margin-top: 20px; padding-bottom: 50px; }
        .card { background: rgba(10, 25, 47, 0.7); padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* CHAT AREA */
        .chat-area { background: rgba(0, 0, 0, 0.4); height: 250px; border-radius: 15px; overflow-y: auto; margin-bottom: 15px; padding: 15px; font-size: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid #233554; padding: 12px; border-radius: 10px; color: white; outline: none; }
        .send-btn { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .btn { display: block; width: 100%; padding: 18px; text-decoration: none; font-weight: 900; border-radius: 15px; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
        .green { background: #22c55e; color: #010813; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">BRIMES LIVE WEBINAR</div>
        <div style="color: #22c55e; font-size: 10px;">● LIVE CHAT SYNCED</div>
    </nav>

    <div id="audio-trigger">
        <h1 style="color: #22c55e; margin-bottom: 20px;">READY TO BEGIN?</h1>
        <button class="play-btn" onclick="startExperience()">ENTER WEBINAR</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="chat-area" id="chat">
                <div class="msg"><i>Connecting to live chat...</i></div>
            </div>

            <div class="input-group">
                <input type="text" id="userName" placeholder="Your Name">
                <input type="text" id="userMsg" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">SEND TO EVERYONE</button>
            </div>

            <a href="https://chat.whatsapp.com/BtAjTILBhyD3G47gTcJuBO?mode=gi_t" class="btn green">JOIN THE OFFICIAL GROUP</a>
        </div>
    </div>

    <script>
        // --- STEP 1: CONFIGURATION ---
        // You need to create a free Firebase account at console.firebase.google.com
        // and paste your "Config" here. 
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const chatRef = database.ref('live_chat');

        function startExperience() {
            document.getElementById('audio-trigger').style.display = 'none';
            // Start listening for messages from other people
            loadMessages();
        }

        // SEND MESSAGE TO EVERYONE
        function sendMessage() {
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('userMsg').value;

            if(name && msg) {
                chatRef.push({
                    username: name,
                    message: msg,
                    timestamp: Date.now()
                });
                document.getElementById('userMsg').value = ''; // clear input
            }
        }

        // LISTEN FOR EVERYONE'S COMMENTS
        function loadMessages() {
            const chatBox = document.getElementById('chat');
            chatBox.innerHTML = ''; // Clear "Connecting" text

            chatRef.limitToLast(15).on('child_added', (snapshot) => {
                const data = snapshot.val();
                const d = document.createElement('div');
                d.className = 'msg';
                d.innerHTML = `<span style="color:#22c55e;font-weight:bold">${data.username}:</span> ${data.message}`;
                chatBox.appendChild(d);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
