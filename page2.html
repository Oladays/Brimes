<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIMES Trading Signals Academy</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(1, 8, 19, 0.9), rgba(1, 8, 19, 0.9)), 
                        url('https://images.unsplash.com/photo-1611974714025-e6148a234e5f?auto=format&fit=crop&q=80&w=2070');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; 
        }
        
        /* Ticker */
        .ticker-wrap { width: 100%; overflow: hidden; background: rgba(10, 25, 47, 0.8); border-bottom: 1px solid #233554; height: 30px; display: flex; align-items: center; backdrop-filter: blur(5px); }
        .ticker { display: inline-block; white-space: nowrap; animation: marquee 30s linear infinite; font-size: 10px; color: #22c55e; font-weight: bold; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .navbar { width: 100%; background: rgba(10, 25, 47, 0.9); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #233554; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { color: #22c55e; font-weight: 900; font-size: 13px; text-transform: uppercase; }
        .live-count { font-size: 11px; color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 5px 10px; border-radius: 20px; border: 1px solid #22c55e; }

        /* Welcome Overlay */
        #audio-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(10, 25, 47, 0.98) 0%, #010813 100%); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .welcome-text { color: #22c55e; font-size: 32px; font-weight: 950; letter-spacing: 1px; margin-bottom: 25px; text-transform: uppercase; text-shadow: 0 0 25px rgba(34, 197, 94, 0.7); line-height: 1.1; }
        .play-btn { background: #22c55e; color: #010813; border: none; padding: 22px 60px; border-radius: 50px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 0 40px rgba(34, 197, 94, 0.5); animation: pulse 2s infinite; text-transform: uppercase; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .container { width: 95%; max-width: 450px; margin-top: 20px; padding-bottom: 50px; }

        /* Card Elements */
        .card { background: rgba(10, 25, 47, 0.7); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 25px; }

        .video-wrap { position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 15px; border-radius: 15px; overflow: hidden; border: 2px solid #22c55e; background: #000; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Chat Logic Styling */
        .chat-area { background: rgba(0, 0, 0, 0.4); height: 220px; border-radius: 20px; overflow-y: auto; margin-bottom: 20px; padding: 18px; border: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); border-left: 3px solid #22c55e; text-align: left; }
        
        .input-box { background: rgba(17, 34, 64, 0.8); border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #3b82f6; }
        .input-box input { background: transparent; border: none; border-bottom: 1px solid #233554; color: white; width: 100%; padding: 10px; margin-bottom: 12px; outline: none; }
        .input-box button { background: #3b82f6; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }

        .whatsapp-btn { display: block; width: 100%; padding: 18px; background: #25d366; color: white; text-align: center; text-decoration: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }

        .gift-banner { background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(251,191,36,0.05)); border: 1px solid #fbbf24; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker">XAUUSD: 2,024.45 ▲ | EURUSD: 1.0821 ▼ | BTCUSD: 51,204.10 ▲</div>
    </div>

    <nav class="navbar">
        <div class="logo">BRIMES Academy</div>
        <div class="live-count">● 1,200 ONLINE</div>
    </nav>

    <div id="audio-trigger">
        <div class="welcome-text">WELCOME TO<br>BRIMES ACADEMY</div>
        <button class="play-btn" onclick="startSession()">ACCESS MASTERCLASS</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="video-wrap">
                <iframe src="https://www.youtube.com/embed/cXovfksZV08" allowfullscreen></iframe>
            </div>

            <div class="chat-area" id="chat">
                <div class="msg"><b>System:</b> Welcome! Introduce yourself in the chat below.</div>
            </div>

            <div class="input-box">
                <input type="text" id="userName" placeholder="Your Name">
                <input type="text" id="userMsg" placeholder="Ask a question...">
                <button onclick="postMsg()">Post Comment</button>
            </div>

            <div class="gift-banner">
                <p style="color: #fbbf24; margin: 0; font-weight: bold;">🎁 FREE BONUS — Join Today!</p>
                <small style="color: #94a3b8;">Get our exclusive Gold Strategy PDF FREE!</small>
            </div>

            <a href="https://chat.whatsapp.com/BtAjTILBhyD3G47gTcJuBO?mode=gi_t" class="whatsapp-btn">
                Join VIP WhatsApp Group
            </a>
        </div>
    </div>

    <script>
        // Makes the welcome screen disappear
        function startSession() {
            document.getElementById('audio-trigger').style.display = 'none';
        }

        // Makes the chat box work locally
        function postMsg() {
            const name = document.getElementById('userName').value || "Guest";
            const msg = document.getElementById('userMsg').value;
            if(msg.trim() !== "") {
                const chat = document.getElementById('chat');
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b>${name}:</b> ${msg}`;
                chat.appendChild(div);
                document.getElementById('userMsg').value = '';
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>

</body>
</html>
