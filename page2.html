<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIMES Academy Live</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #010813; color: white; display: flex; flex-direction: column; align-items: center; 
        }
        .navbar { 
            width: 100%; background: #0a192f; padding: 15px; text-align: center; 
            border-bottom: 2px solid #22c55e; position: sticky; top: 0; z-index: 100;
        }
        .container { width: 95%; max-width: 500px; margin-top: 20px; padding: 10px; }
        .chat-card { 
            background: rgba(10, 25, 47, 0.8); border-radius: 20px; padding: 20px; 
            border: 1px solid rgba(34, 197, 94, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #chat { 
            height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); 
            border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #233554;
        }
        .msg { margin-bottom: 10px; font-size: 14px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .input-area { display: flex; flex-direction: column; gap: 10px; }
        input { 
            padding: 12px; border-radius: 8px; border: 1px solid #233554; 
            background: #010813; color: white; outline: none;
        }
        input:focus { border-color: #22c55e; }
        .send-btn { 
            background: #22c55e; color: #010813; border: none; padding: 12px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .whatsapp-btn { 
            display: block; width: 100%; padding: 15px; background: #25d366; 
            color: white; text-align: center; text-decoration: none; border-radius: 10px; 
            margin-top: 20px; font-weight: 800; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="color: #22c55e; font-weight: 900; letter-spacing: 2px;">BRIMES ACADEMY LIVE</div>
    </div>

    <div class="container">
        <div class="chat-card">
            <h3 style="margin-top: 0; color: #22c55e;">Live Webinar Chat</h3>
            <div id="chat"></div>
            
            <div class="input-area">
                <input type="text" id="userName" placeholder="Enter your name...">
                <input type="text" id="userMsg" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">POST COMMENT</button>
            </div>

            <a href="https://chat.whatsapp.com/BtAjTILBhyD3G47gTcJuBO" class="whatsapp-btn">
                Join Webinar WhatsApp Group
            </a>
        </div>
    </div>

    <script>
        // Your Verified Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAGw5LwmERMplZKrq59aheXo1XQVaqZhwo",
            authDomain: "brimeschat-2d37e.firebaseapp.com",
            projectId: "brimeschat-2d37e",
            databaseURL: "https://brimeschat-2d37e-default-rtdb.firebaseio.com",
            storageBucket: "brimeschat-2d37e.firebasestorage.app",
            messagingSenderId: "461654767662",
            appId: "1:461654767662:web:58a7028dfcdea47d90c7bf"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const chatRef = firebase.database().ref('webinar_messages');

        // Function to send messages
        function sendMessage() {
            const nameInput = document.getElementById('userName');
            const msgInput = document.getElementById('userMsg');
            
            if (msgInput.value.trim() !== "") {
                const name = nameInput.value.trim() || "Anonymous";
                chatRef.push({
                    username: name,
                    message: msgInput.value,
                    timestamp: Date.now()
                });
                msgInput.value = ""; // Clear message box after sending
            }
        }

        // Listen for new messages (Live Sync)
        chatRef.limitToLast(20).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById('chat');
            const messageElement = document.createElement('div');
            messageElement.className = 'msg';
            messageElement.innerHTML = `<strong style="color: #22c55e;">${data.username}:</strong> ${data.message}`;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        });

        // Allow pressing "Enter" to send
        document.getElementById("userMsg").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>

</body>
</html>
