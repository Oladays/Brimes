<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIMES Academy Live</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: #010813; color: white; display: flex; flex-direction: column; align-items: center; 
        }
        
        .navbar { 
            width: 100%; background: #0a192f; padding: 15px; text-align: center; 
            border-bottom: 2px solid #22c55e; position: sticky; top: 0; z-index: 100;
        }

        .container { width: 95%; max-width: 500px; margin-top: 20px; padding-bottom: 50px; }
        
        .video-box {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 15px; margin-bottom: 20px; border: 1px solid #233554;
            display: flex; align-items: center; justify-content: center;
        }

        .card { 
            background: rgba(10, 25, 47, 0.8); border-radius: 25px; padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-area { 
            height: 250px; overflow-y: auto; background: rgba(0,0,0,0.4); 
            border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        .msg { margin-bottom: 10px; font-size: 13px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; border-left: 3px solid #22c55e; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        
        input { 
            padding: 12px; border-radius: 10px; border: 1px solid #233554; 
            background: rgba(255,255,255,0.05); color: white; outline: none;
        }

        .send-btn { 
            background: #22c55e; color: #010813; border: none; padding: 15px; 
            border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        .whatsapp-btn { 
            display: block; width: 100%; padding: 18px; background: #25d366; 
            color: white; text-align: center; text-decoration: none; border-radius: 15px; 
            margin-top: 20px; font-weight: 900; text-transform: uppercase; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="color: #22c55e; font-weight: 900; letter-spacing: 1px; font-size: 14px;">BRIMES ACADEMY LIVE</div>
    </nav>

    <div class="container">
        <div class="video-box">
            <span style="color: #444;">Live Stream Loading...</span>
        </div>

        <div class="card">
            <h2 style="margin-top: 0; color: #22c55e; font-size: 18px; text-align: center;">Live Discussion</h2>
            
            <div class="chat-area" id="chat">
                <div class="msg"><b>System:</b> Welcome! Join the conversation below.</div>
            </div>
            
            <div class="input-group">
                <input type="text" id="userName" placeholder="Your Name">
                <input type="text" id="userMsg" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">Post Comment</button>
            </div>

            <a href="https://chat.whatsapp.com/BtAjTILBhyD3G47gTcJuBO?mode=gi_t" class="whatsapp-btn">
                Join WhatsApp Group
            </a>
        </div>
    </div>

    <script>
        function sendMessage() {
            const nameInput = document.getElementById('userName');
            const msgInput = document.getElementById('userMsg');
            const chatBox = document.getElementById('chat');
            
            if(msgInput.value.trim() !== "") {
                const name = nameInput.value.trim() || "Guest";
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b style="color:#22c55e">${name}:</b> ${msgInput.value}`;
                chatBox.appendChild(div);
                
                msgInput.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById("userMsg").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>

</body>
</html>
                                                                                        </html>
